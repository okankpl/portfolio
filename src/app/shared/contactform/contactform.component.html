<div class="container">
  <div class="headline-text-container">
    <h2>Want to discuss a new project?</h2>
    <h4>Say Hello! let's discuss your ideas an make it happen</h4>
  </div>

  <form (ngSubmit)="onSubmit()">
    <input
      [(ngModel)]="contactData.name"
      type="text"
      id="name"
      name="name"
      placeholder="Your name"
    />
    <input
    [(ngModel)]="contactData.email"
      type="email"
      id="email"
      name="email"
      placeholder="Your email"
    />
    <textarea
    [(ngModel)]="contactData.message"
      id="message"
      name="message"
      placeholder="Your Message"
      style="height: 200px"
    ></textarea>
    <p>
      I've read the <span style="color: orange">privacy policy</span> and agree
      to the procesing of my data as outlined
    </p>
    <input type="submit" value="Send message" />
  </form>
</div>

<section>
  <app-nav-arrow-mirrored></app-nav-arrow-mirrored>
  <div>
    <h1>Portfolio</h1>
    <span>
      Explore a selection of my work here - interact <br />
      with projects to see my skills in action
    </span>
  </div>

  <div>
    @for (project of projects; track $index) {
    <div class="portfolio-container {{ $index % 2 == 1 ? 'reverse' : '' }}">
      <div class="portfolio-img">
        <a href="{{project.projecturl}}" target="_blank">
          <img src="{{ project.img }}" alt="" />
        </a>
        <div class="hover-box">
          <div class="hover-border"></div>
          <div class="arrow-box"></div>
        </div>
      </div>
      <div class="desc">
        <div>
          <h2>{{ project.title }}</h2>
          <h3>{{ project.languages }}</h3>
          <p>
            {{ project.description }}
          </p>
          <div>
            <div>GitHub</div>
            <div>Test</div>
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</section>

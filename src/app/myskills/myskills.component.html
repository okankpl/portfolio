<section>
    <div class="skills-container">
      <h1>My Skills</h1>
      <div class="my-skills">
        @for (skill of skills; track $index) {
        <div>
          <img src="./../../assets/img/{{ skill.icon }}" alt="" />
          <span>{{ skill.name }}</span>
        </div>
        }
      </div>
    </div>
  </section>
